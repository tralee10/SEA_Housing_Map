<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Seattle Population 2010</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Titillium+Web|Oswald" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="css/pop_map.css">

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.js"></script>
    
</head>

<body>
    <div id="map"></div>
    <div class='map-overlay' id='features'>
        <h2>Seattle Population</h2>
        <div id='text-description'>
            <p>

            </p>
        </div>
    </div>
    <div class='map-overlay' id='legend'></div>
    <script src="js/pop_map.js"></script>
</body>

</html>
